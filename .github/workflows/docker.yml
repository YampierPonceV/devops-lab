name: Docker CI

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t mi_app .
        
      - name: Deploy to Server
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: 0.tcp.sa.ngrok.io
          port: 18273
          username: devops
          key: ${{ secrets.SSH_KEY}}
          script: | 
            docker rm -f mi_app || true
            docker run -d -p 8080:80 mi_app
