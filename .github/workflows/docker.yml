name: Docker CI

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t mi_app .
        
      - name: Stop old image
        run: docker rm -f mi_app || true

      - name: Deploy (simulacion)
        run: docker run -d -p 8080:80 mi_app 
